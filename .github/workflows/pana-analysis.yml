name: Pana Analysis

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - '**.md'
      - 'doc/**'
  pull_request:
    branches: [ master, main ]
    paths-ignore:
      - '**.md'
      - 'doc/**'
  workflow_dispatch:

jobs:
  pana:
    name: Run pana analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: pdfrx_engine
            package_path: packages/pdfrx_engine
          - package_name: pdfrx
            package_path: packages/pdfrx
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y webp

      - name: Setup Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 --branch stable ~/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          ~/flutter/bin/flutter config --no-enable-android --no-enable-linux-desktop
          ~/flutter/bin/flutter channel stable
          ~/flutter/bin/flutter doctor -v

      - name: Pub get (workspace)
        run: flutter pub get

      - name: Activate pana
        run: |
          dart pub global activate pana
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Prepare package for pana (${{ matrix.package_name }})
        run: |
          PANA_WORKDIR="$(mktemp -d)"
          mkdir -p "$PANA_WORKDIR/packages"

          cp -R packages/pdfium_dart "$PANA_WORKDIR/packages/pdfium_dart"
          cp -R packages/pdfium_flutter "$PANA_WORKDIR/packages/pdfium_flutter"
          cp -R packages/pdfrx_engine "$PANA_WORKDIR/packages/pdfrx_engine"
          cp -R packages/pdfrx "$PANA_WORKDIR/packages/pdfrx"

          for pubspec in "$PANA_WORKDIR"/packages/*/pubspec.yaml; do
            perl -0pi -e 's/^resolution: workspace\n//m' "$pubspec"
          done

          export PDFIUM_DART_PATH="$PANA_WORKDIR/packages/pdfium_dart"
          export PDFIUM_FLUTTER_PATH="$PANA_WORKDIR/packages/pdfium_flutter"
          export PDFRX_ENGINE_PATH="$PANA_WORKDIR/packages/pdfrx_engine"

          perl -0pi -e 's|^  pdfium_dart: .+$|  pdfium_dart:\n    path: $ENV{PDFIUM_DART_PATH}|m' "$PANA_WORKDIR/packages/pdfium_flutter/pubspec.yaml"
          perl -0pi -e 's|^  pdfium_dart: .+$|  pdfium_dart:\n    path: $ENV{PDFIUM_DART_PATH}|m' "$PANA_WORKDIR/packages/pdfrx_engine/pubspec.yaml"
          perl -0pi -e 's|^  pdfium_flutter: .+$|  pdfium_flutter:\n    path: $ENV{PDFIUM_FLUTTER_PATH}|m' "$PANA_WORKDIR/packages/pdfrx/pubspec.yaml"
          perl -0pi -e 's|^  pdfrx_engine: .+$|  pdfrx_engine:\n    path: $ENV{PDFRX_ENGINE_PATH}|m' "$PANA_WORKDIR/packages/pdfrx/pubspec.yaml"

          echo "PANA_PACKAGE_PATH=$PANA_WORKDIR/${{ matrix.package_path }}" >> "$GITHUB_ENV"

      - name: Run pana (${{ matrix.package_name }})
        run: |
          cd "$PANA_PACKAGE_PATH"
          ~/.pub-cache/bin/pana --json --no-warning --exit-code-threshold 0 | jq -e 'select(has("tags")) | .tags | any(. == "is:wasm-ready")'
