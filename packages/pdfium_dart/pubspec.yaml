name: pdfium_dart
description: Dart FFI bindings for PDFium library. Provides low-level access to PDFium's C API from Dart.
version: 0.2.5
homepage: https://github.com/espresso3389/pdfrx
repository: https://github.com/espresso3389/pdfrx/tree/master/packages/pdfium_dart
issue_tracker: https://github.com/espresso3389/pdfrx/issues

environment:
  sdk: ^3.10.0
resolution: workspace

dependencies:
  archive:
  code_assets:
  ffi:
  hooks:
  http:

dev_dependencies:
  ffigen:
  lints:
  test:

# To generate the bindings, run:
#  dart tool/ffigen.dart
ffigen:
  output:
    bindings: "lib/src/pdfium_bindings.dart"
  description: "Bindings for PDFium C API"
  headers:
    entry-points:
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_signature.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_sysfontinfo.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_javascript.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_text.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_searchex.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_progressive.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdfview.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_edit.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_attachment.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_annot.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_catalog.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_ppo.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_formfill.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_save.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_doc.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_structtree.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_dataavail.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_fwlevent.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_ext.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_transformpage.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_flatten.h"
      - ".dart_tool/pdfium_headers/chromium_7811/include/fpdf_thumbnail.h"
    include-directives:
      - ".dart_tool/pdfium_headers/chromium_7811/include/**"
  preamble: |
    // ignore_for_file: unused_field
    // dart format off
  name: "PDFium"
  comments:
    style: any
    length: full
