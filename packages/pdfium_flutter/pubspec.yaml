name: pdfium_flutter
description: Flutter FFI plugin for PDFium integration on Android, iOS, Windows, macOS, and Linux.
version: 0.2.3
homepage: https://github.com/espresso3389/pdfrx
repository: https://github.com/espresso3389/pdfrx/tree/master/packages/pdfium_flutter
issue_tracker: https://github.com/espresso3389/pdfrx/issues

environment:
  sdk: ^3.10.0
  flutter: ">=3.41.0"
resolution: workspace

dependencies:
  pdfium_dart: ^0.2.5
  code_assets:
  ffi:
  flutter:
    sdk: flutter
  hooks:
  path:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: PDFiumFlutterPlugin
        ffiPlugin: true
        sharedDarwinSource: true
      macos:
        pluginClass: PDFiumFlutterPlugin
        ffiPlugin: true
        sharedDarwinSource: true
